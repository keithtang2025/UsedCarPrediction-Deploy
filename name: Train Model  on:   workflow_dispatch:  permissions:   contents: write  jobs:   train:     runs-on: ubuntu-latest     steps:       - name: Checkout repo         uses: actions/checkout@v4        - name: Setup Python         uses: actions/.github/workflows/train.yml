name: Train Model

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training
        run: |
          python train.py

      - name: Commit and push model artifact
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Adjust this path to whatever your train.py outputs:
          git add -A model

          # Don't fail if nothing changed
          git commit -m "Auto-train model [skip ci]" || echo "No changes to commit"

          git push
