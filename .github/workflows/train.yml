name: Train Model

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run training
        run: |
          python train.py

      - name: Commit model
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add model
          git commit -m "Auto trained model" || echo "nothing to commit"

          git push
